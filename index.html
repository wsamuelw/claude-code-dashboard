<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Code Token Usage</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 960px; margin: 0 auto; }

    /* ── Header ──────────────────────────── */
    .header { margin-bottom: 28px; }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .subtitle { color: #64748b; font-size: 12px; margin-top: 4px; }

    /* ── Range selector ──────────────────── */
    .range-selector {
      display: flex;
      gap: 4px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      width: fit-content;
    }
    .range-btn {
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .range-btn:hover { color: #94a3b8; background: #334155; }
    .range-btn.active {
      background: #6366f1;
      color: #fff;
      box-shadow: 0 1px 3px rgba(99,102,241,0.3);
    }

    /* ── Stats cards ─────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px 16px 8px;
      position: relative;
      overflow: hidden;
    }
    .stat-header { display: flex; align-items: baseline; gap: 8px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #e2e8f0; }
    .stat-trend {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .trend-up { color: #10b981; background: #10b98118; }
    .trend-down { color: #ef4444; background: #ef444418; }
    .trend-flat { color: #64748b; background: #64748b18; }
    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
    .sparkline {
      width: 100%;
      height: 28px;
      margin-top: 8px;
      display: block;
    }

    /* ── Chart sections ──────────────────── */
    .chart-section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .chart-title {
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }
    .chart-wrap { height: 280px; }
    .model-chart-wrap { height: 400px; }

    .two-col {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    /* ── Drop zone ───────────────────────── */
    .drop-zone {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed #475569;
      border-radius: 16px;
      padding: 64px 32px;
      margin: 48px 0;
      text-align: center;
      transition: all 0.2s;
    }
    .drop-zone.dragover {
      border-color: #6366f1;
      background: rgba(99,102,241,0.05);
    }
    .drop-zone-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .drop-zone-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .drop-zone-hint { font-size: 13px; color: #64748b; }
    .drop-zone-path {
      font-size: 12px;
      color: #475569;
      margin-top: 16px;
      font-family: monospace;
      background: #1e293b;
      padding: 8px 16px;
      border-radius: 6px;
    }
    #drop-error { color: #f87171; font-size: 13px; margin-top: 12px; }

    /* ── Busiest days ─────────────────────── */
    .busiest-list { display: flex; flex-direction: column; gap: 8px; }
    .busiest-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: #0f172a;
      border-radius: 8px;
    }
    .busiest-rank {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #6366f120;
      color: #6366f1;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .busiest-row:first-child .busiest-rank { background: #f59e0b20; color: #f59e0b; }
    .busiest-date { flex: 1; }
    .busiest-day { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .busiest-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    .busiest-tokens { font-size: 14px; font-weight: 700; color: #6366f1; }

    @media (max-width: 640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Claude Code Token Usage</h1>
      <p class="subtitle" id="date-range"></p>
    </div>

    <div id="drop-zone" class="drop-zone">
      <div class="drop-zone-icon">📂</div>
      <div class="drop-zone-title">Drop your stats-cache.json here</div>
      <div class="drop-zone-hint">From <code>~/.claude/stats-cache.json</code></div>
      <div class="drop-zone-path">cp ~/.claude/stats-cache.json ~/</div>
      <div id="drop-error"></div>
    </div>

    <div id="charts" style="display:none">
      <div class="range-selector">
        <button class="range-btn" data-range="7d">7 days</button>
        <button class="range-btn" data-range="14d">14 days</button>
        <button class="range-btn" data-range="30d">30 days</button>
        <button class="range-btn" data-range="90d">90 days</button>
        <button class="range-btn active" data-range="all">All time</button>
      </div>

      <div class="stats-row" id="stats"></div>

      <div class="chart-section">
        <div class="chart-title">Daily Token Usage</div>
        <div class="chart-wrap">
          <canvas id="dailyChart"></canvas>
        </div>
      </div>

      <div class="two-col">
        <div class="chart-section">
          <div class="chart-title">Tokens by Model</div>
          <div class="model-chart-wrap">
            <canvas id="modelChart"></canvas>
          </div>
        </div>
        <div class="chart-section">
          <div class="chart-title">Input vs Output vs Cache</div>
          <div class="chart-wrap">
            <canvas id="typeChart"></canvas>
          </div>
        </div>
      </div>

      <div class="two-col">
        <div class="chart-section">
          <div class="chart-title">Usage by Hour of Day</div>
          <div class="chart-wrap">
            <canvas id="hourChart"></canvas>
          </div>
        </div>
        <div class="chart-section">
          <div class="chart-title">Tool Calls per Day</div>
          <div class="chart-wrap">
            <canvas id="toolsChart"></canvas>
          </div>
        </div>
      </div>

      <div class="two-col">
        <div class="chart-section">
          <div class="chart-title">Sessions per Day</div>
          <div class="chart-wrap">
            <canvas id="sessionsChart"></canvas>
          </div>
        </div>
        <div class="chart-section">
          <div class="chart-title">Busiest Days</div>
          <div id="busiest-list" class="busiest-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
